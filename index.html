<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Financelli</title>
    <meta name="description" content="Personal finance dashboard" />

    <!-- Theme colour (browser chrome / Android task switcher) -->
    <meta name="theme-color" content="#1DB954" />

    <!-- PWA icons -->
    <link rel="icon" href="/pwa-icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />

    <!-- iOS PWA — fullscreen, no Safari chrome -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Financelli" />

    <!-- Android / generic -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Financelli" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
